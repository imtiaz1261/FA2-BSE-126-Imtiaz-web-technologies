<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker Dashboard</title>
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <header class="app-header">
    <div class="container nav">
      <a href="index.html" class="brand has-logo" aria-label="Local Services home">
        <img src="logo.webp" alt="Local Services logo" class="brand-mark">
        <span>Local Services</span>
      </a>
      <nav class="nav-links">
        <a class="chip" href="services.html">Services</a>
        <a class="chip" href="chat.html">Chat</a>
        <span id="authLinks">
          <a class="chip" href="login.html">Login</a>
          <a class="chip" href="signup.html">Signup</a>
        </span>
        <span id="userMenu" class="hidden">
          <a id="dashboardLink" class="chip" href="dashboard-worker.html">Dashboard</a>
          <button id="logoutBtn" class="chip">Logout</button>
          <span id="userName" class="chip"></span>
        </span>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero page-hero">
      <h1>Worker Dashboard</h1>
      <p class="muted">Hello <span id="welcomeWorker"></span>. Track bookings, earnings overview, and recent activity.</p>
    </section>
    <section id="workerStats" class="grid cards"></section>

    <section class="row-2 mt-2">
      <article class="card">
        <h3>Pending Requests</h3>
        <div id="pendingRequests" class="list mt-1"></div>
      </article>
      <article class="card">
        <h3>Recent Activity Logs</h3>
        <div id="activityLogs" class="list mt-1"></div>
      </article>
    </section>

    <section class="row-2 mt-2">
      <article class="card">
        <h3>Completed Jobs</h3>
        <div id="completedJobs" class="list mt-1"></div>
      </article>
      <article class="card">
        <h3>All Booking Details</h3>
        <div id="bookingDetails" class="list mt-1"></div>
      </article>
    </section>
  </main>

  <script src="assets/js/storage.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/dashboard-worker.js"></script>
</body>
</html>
