<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Listings</title>
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <header class="app-header">
    <div class="container nav">
      <a href="index.html" class="brand has-logo" aria-label="Local Services home">
        <img src="logo.webp" alt="Local Services logo" class="brand-mark">
        <span>Local Services</span>
      </a>
      <nav class="nav-links">
        <a class="chip" href="index.html">Home</a>
        <a class="chip" href="booking.html">Booking</a>
        <a class="chip" href="chat.html">Chat</a>
        <span id="authLinks">
          <a class="chip" href="login.html">Login</a>
          <a class="chip" href="signup.html">Signup</a>
        </span>
        <span id="userMenu" class="hidden">
          <a id="dashboardLink" class="chip" href="dashboard-user.html">Dashboard</a>
          <button id="logoutBtn" class="chip">Logout</button>
          <span id="userName" class="chip"></span>
        </span>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero page-hero">
      <h1>Service Listings</h1>
      <p class="muted">Search by keyword, filter by category, and pick top-rated professionals.</p>
      <div class="filters">
        <input id="search" placeholder="Search services or tasks">
        <select id="category"></select>
        <select id="minRating">
          <option value="0">Any rating</option>
          <option value="4">4+ stars</option>
          <option value="4.5">4.5+ stars</option>
        </select>
      </div>
      <div class="filters" style="grid-template-columns:1fr">
        <input id="customerAddress" placeholder="Customer full address (nearest worker suggestion ke liye)">
      </div>
      <p id="resultCount" class="muted"></p>
    </section>
    <section id="serviceList" class="grid cards"></section>
  </main>

  <script src="assets/js/storage.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/geocode.js"></script>
  <script src="assets/js/services.js"></script>
</body>
</html>
